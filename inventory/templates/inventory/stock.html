{% extends 'base.html' %}

{% block content %}

<h2>Stock IN / OUT</h2>

<!-- FORM -->
<form method="POST" class="card p-3 mb-4">
    {% csrf_token %}

    <div class="row">

        <div class="col-md-3">
            <label>Item</label>
            <select name="item" class="form-control" required>
                {% for item in items %}
                    <option value="{{ item.id }}">{{ item.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <label>Type</label>
            <select name="movement_type" class="form-control">
                <option value="in">Stock IN</option>
                <option value="out">Stock OUT</option>
            </select>
        </div>

        <div class="col-md-3">
            <label>Quantity</label>
            <input type="number" step="0.01" name="quantity" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label>Reason</label>
            <input type="text" name="reason" class="form-control">
        </div>

    </div>

    <button class="btn btn-success mt-3">Submit</button>
</form>

<!-- TABLE -->
<h4>Stock History</h4>

<table class="table table-bordered">
    <tr>
        <th>Item</th>
        <th>Type</th>
        <th>Quantity</th>
        <th>Reason</th>
        <th>Date</th>
    </tr>

    {% for m in movements %}
    <tr>
        <td>{{ m.item.name }}</td>
        <td>{{ m.movement_type }}</td>
        <td>{{ m.quantity }}</td>
        <td>{{ m.reason }}</td>
        <td>{{ m.created_at }}</td>
    </tr>
    {% endfor %}
</table>
<a href="/inventory/dashboard/" class="btn btn-secondary">
                Back to Dashboard
            </a>
{% endblock %}
