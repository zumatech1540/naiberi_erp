<!DOCTYPE html>
<html>
<head>
    <title>Naiberi MRF ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { margin: 0; font-family: Arial; }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #1f2937;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover { background: #374151; }

        .main {
            margin-left: 250px;
            padding: 20px;
        }

        .topbar {
            background: #0f172a;
            color: white;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <h4 class="text-center">MRF ERP</h4>
    <hr>

    <!-- ================= DASHBOARD ROUTING ================= -->
    
   <div class="sidebar">

    <hr>

    <a href="/collector/"><i class="fa fa-tachometer-alt"></i> Collector Dashboard</a>
    <a href="/waste/"><i class="fa fa-recycle"></i> Waste</a>
    <a href="/inventory/"><i class="fa fa-box"></i> Inventory</a>
    <a href="/finance/"><i class="fa fa-coins"></i> Finance</a>
    <a href="/hr/"><i class="fa fa-users"></i> HR</a>
    <a href="/sales/"><i class="fa fa-chart-bar"></i> Sales</a>
    <a href="/reports/"><i class="fa fa-chart-bar"></i> Reports</a>
    <a href="/admin/"><i class="fa fa-user-cog"></i> Admin Panel</a>
    
    <hr>
    <a href="/logout/"><i class="fa fa-sign-out"></i> Logout</a>
</div>
    <!-- ================= SHARED ================= -->
    
   
    <hr>

    <a href="/logout/">
        <i class="fa fa-sign-out"></i> Logout
    </a>

</div>

<div class="main">

    <div class="topbar d-flex justify-content-between">
        <h5>Naiberi MRF ERP System</h5>
        <div>User: {{ request.user.username }} ({{ request.user.role }})</div>
    </div>

    <hr>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
