{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <!-- HEADER -->
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">💰 Add New Expense</h4>
                    <small>Record company operational costs</small>
                </div>

                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <!-- CATEGORY -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Expense Category</label>

                            <select name="category" class="form-select" required>
                                <option value="">-- Select Category --</option>
                                <option value="salary">Salary</option>
                                <option value="rent">Rent</option>
                                <option value="fuel">Fuel</option>
                                <option value="transport">Transport</option>
                                <option value="utilities">Utilities</option>
                                <option value="maintenance">Maintenance</option>
                                <option value="office_supplies">Office Supplies</option>
                                <option value="tax">Tax</option>
                                <option value="miscellaneous">Miscellaneous</option>
                            </select>
                        </div>

                        <!-- AMOUNT -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Amount (KES)</label>
                            <input type="number"
                                   name="amount"
                                   step="0.01"
                                   class="form-control"
                                   placeholder="Enter expense amount"
                                   required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Optional notes about this expense"></textarea>
                        </div>

                        <!-- INFO BOX -->
                        <div class="alert alert-info py-2">
                            <small>
                                📌 Expense will be recorded under finance module and reflected in profit & loss reports.
                            </small>
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-flex justify-content-between">

                            <a href="{% url 'expense_list' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-danger px-4">
                                ➕ Save Expense
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
<a href="{% url 'finance_dashboard' %}"
   class="btn btn-outline-primary btn-md shadow-sm px-3">
    ⬅ Return to Dashboard
</a>
</div>

{% endblock %}
