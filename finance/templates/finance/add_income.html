{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Add Income</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Income Source</label>
                            <input type="text" name="source" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Amount (KES)</label>
                            <input type="number" step="0.01" name="amount" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select name="department" class="form-select" required>
                                <option value="" disabled selected>-- Select a Department --</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'income_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Save Income</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3 justify-content-center">
        {% if ar.id %}
            <a href="{% url 'invoice_pdf' ar.id %}" class="btn btn-sm btn-danger">Download Invoice PDF</a>
        {% endif %}
        
        <a href="{% url 'finance_dashboard' %}" class="btn btn-outline-primary btn-md shadow-sm px-3">
            ⬅ Return to Dashboard
        </a>
    </div>
</div>

{% endblock %}
