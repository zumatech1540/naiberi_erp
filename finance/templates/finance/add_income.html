{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Add Income</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <!-- SOURCE -->
                        <div class="mb-3">
                            <label class="form-label">Income Source</label>
                            <input type="text" name="source" class="form-control" required>
                        </div>

                        <!-- AMOUNT -->
                        <div class="mb-3">
                            <label class="form-label">Amount (KES)</label>
                            <input type="number" step="0.01" name="amount" class="form-control" required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-flex justify-content-between">

                            <a href="{% url 'income_list' %}" class="btn btn-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-success">
                                Save Income
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <a href="{% url 'invoice_pdf' ar.id %}" class="btn btn-sm btn-danger">
    Download Invoice PDF
</a>
<a href="{% url 'finance_dashboard' %}"
   class="btn btn-outline-primary btn-md shadow-sm px-3">
    ⬅ Return to Dashboard
</a>
</div>

{% endblock %}
